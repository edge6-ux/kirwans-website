<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#1A1808"/>
      <stop offset="100%" stop-color="#0D1F18"/>
    </radialGradient>
    <radialGradient id="fireGlow" cx="50%" cy="80%" r="65%">
      <stop offset="0%" stop-color="#E85A08" stop-opacity="0.8"/>
      <stop offset="30%" stop-color="#CC4808" stop-opacity="0.5"/>
      <stop offset="60%" stop-color="#E8A830" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#0D1F18" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="emberGlow" cx="50%" cy="90%" r="40%">
      <stop offset="0%" stop-color="#FF6820" stop-opacity="0.9"/>
      <stop offset="50%" stop-color="#CC4008" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#0D1F18" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="stoneGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4A4238"/>
      <stop offset="100%" stop-color="#2A2218"/>
    </linearGradient>
    <linearGradient id="mantleGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#5A5248"/>
      <stop offset="100%" stop-color="#3A3228"/>
    </linearGradient>
    <linearGradient id="fireplaceInteriorGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1A0808"/>
      <stop offset="100%" stop-color="#050202"/>
    </linearGradient>
    <filter id="flameGlow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softShadow">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.7"/>
    </filter>
  </defs>

  <!-- Background wall -->
  <rect width="800" height="600" fill="url(#bgGrad)"/>

  <!-- Wall panelling -->
  <g opacity="0.1">
    <rect x="0" y="80" width="800" height="2" fill="#3D2B1A"/>
    <rect x="0" y="160" width="800" height="2" fill="#2C1F10"/>
    <rect x="0" y="240" width="800" height="2" fill="#3D2B1A"/>
  </g>

  <!-- Ambient firelight on wall -->
  <ellipse cx="400" cy="400" rx="440" ry="360" fill="url(#fireGlow)"/>
  <ellipse cx="400" cy="480" rx="220" ry="150" fill="url(#emberGlow)"/>

  <!-- Floor -->
  <rect x="0" y="490" width="800" height="110" fill="#0A0E08"/>
  <rect x="0" y="490" width="800" height="2" fill="#1A2010" opacity="0.5"/>

  <!-- Fireplace surround (stone arch) -->
  <!-- Outer surround left leg -->
  <rect x="155" y="180" width="75" height="320" rx="4" fill="url(#stoneGrad)" filter="url(#softShadow)"/>
  <!-- Outer surround right leg -->
  <rect x="570" y="180" width="75" height="320" rx="4" fill="url(#stoneGrad)" filter="url(#softShadow)"/>
  <!-- Arch top (rectangle with rounded top) -->
  <path d="M 155 180 Q 155 120 230 110 L 570 110 Q 645 120 645 180 L 570 180 Q 570 150 400 148 Q 230 150 230 180 Z"
        fill="url(#stoneGrad)" filter="url(#softShadow)"/>

  <!-- Stone texture on surround - horizontal mortar lines -->
  <g opacity="0.25" stroke="#1A1810" stroke-width="1.5">
    <!-- Left leg stones -->
    <line x1="155" y1="220" x2="230" y2="220"/>
    <line x1="155" y1="260" x2="230" y2="260"/>
    <line x1="155" y1="300" x2="230" y2="300"/>
    <line x1="155" y1="340" x2="230" y2="340"/>
    <line x1="155" y1="380" x2="230" y2="380"/>
    <line x1="155" y1="420" x2="230" y2="420"/>
    <line x1="155" y1="460" x2="230" y2="460"/>
    <!-- Vertical mortar lines left (offset rows) -->
    <line x1="192" y1="220" x2="192" y2="260"/>
    <line x1="175" y1="260" x2="175" y2="300"/>
    <line x1="192" y1="300" x2="192" y2="340"/>
    <!-- Right leg stones -->
    <line x1="570" y1="220" x2="645" y2="220"/>
    <line x1="570" y1="260" x2="645" y2="260"/>
    <line x1="570" y1="300" x2="645" y2="300"/>
    <line x1="570" y1="340" x2="645" y2="340"/>
    <line x1="570" y1="380" x2="645" y2="380"/>
    <line x1="570" y1="420" x2="645" y2="420"/>
    <line x1="570" y1="460" x2="645" y2="460"/>
  </g>

  <!-- Mantle shelf -->
  <rect x="120" y="165" width="560" height="28" rx="3" fill="url(#mantleGrad)" filter="url(#softShadow)"/>
  <!-- Mantle top surface highlight -->
  <rect x="120" y="165" width="560" height="8" rx="3" fill="#7A7068" opacity="0.3"/>
  <!-- Mantle front edge shadow -->
  <rect x="120" y="188" width="560" height="5" rx="2" fill="#1A1808" opacity="0.4"/>

  <!-- Mantle decoration: two candle sticks -->
  <g fill="#C9A86A" opacity="0.55">
    <!-- Left candlestick -->
    <rect x="195" y="130" width="6" height="36" rx="2"/>
    <ellipse cx="198" cy="130" rx="4" ry="2" fill="#D4B870"/>
    <ellipse cx="198" cy="165" rx="10" ry="4"/>
    <ellipse cx="198" cy="168" rx="14" ry="4"/>
    <circle cx="198" cy="127" r="3" fill="#E8C840" opacity="0.7"/>
    <!-- Right candlestick -->
    <rect x="599" y="128" width="6" height="38" rx="2"/>
    <ellipse cx="602" cy="128" rx="4" ry="2" fill="#D4B870"/>
    <ellipse cx="602" cy="165" rx="10" ry="4"/>
    <ellipse cx="602" cy="168" rx="14" ry="4"/>
    <circle cx="602" cy="125" r="3" fill="#E8C840" opacity="0.7"/>
  </g>

  <!-- Fireplace interior (dark opening) -->
  <path d="M 230 182 Q 230 165 260 162 L 540 162 Q 570 165 570 182 L 570 490 L 230 490 Z"
        fill="url(#fireplaceInteriorGrad)"/>

  <!-- Hearth / base of fireplace -->
  <rect x="200" y="488" width="400" height="18" rx="3" fill="#3A3228" filter="url(#softShadow)"/>
  <rect x="190" y="504" width="420" height="10" rx="3" fill="#2A2218"/>

  <!-- Fire logs -->
  <g fill="#2A1408" stroke="#1A0C04" stroke-width="1">
    <!-- Log 1 -->
    <ellipse cx="350" cy="475" rx="80" ry="14" transform="rotate(-8, 350, 475)"/>
    <ellipse cx="350" cy="468" rx="12" ry="14" transform="rotate(-8, 350, 475)" fill="#3A1A08"/>
    <!-- Log 2 -->
    <ellipse cx="430" cy="472" rx="75" ry="13" transform="rotate(6, 430, 472)"/>
    <ellipse cx="430" cy="465" rx="11" ry="13" transform="rotate(6, 430, 472)" fill="#3A1A08"/>
  </g>

  <!-- Embers/coals at log base -->
  <ellipse cx="400" cy="478" rx="100" ry="10" fill="#CC3008" opacity="0.45"/>
  <ellipse cx="400" cy="476" rx="70" ry="7" fill="#FF5010" opacity="0.4"/>

  <!-- FLAMES — layered for depth -->
  <!-- Outer flame (large, orange) -->
  <path d="M 320 470 Q 315 420 340 380 Q 355 345 370 310 Q 385 270 380 230 Q 395 260 400 295 Q 415 260 420 230 Q 415 270 430 310 Q 445 345 460 380 Q 480 420 475 470 Z"
        fill="#CC4808" opacity="0.7" filter="url(#flameGlow)"/>
  <!-- Mid flame (amber) -->
  <path d="M 340 470 Q 335 430 355 395 Q 370 360 378 320 Q 390 348 400 378 Q 410 348 422 320 Q 430 360 445 395 Q 465 430 455 470 Z"
        fill="#E87020" opacity="0.75" filter="url(#flameGlow)"/>
  <!-- Inner flame (bright yellow-orange) -->
  <path d="M 360 470 Q 358 440 372 408 Q 382 380 390 350 Q 398 378 408 350 Q 418 380 428 408 Q 442 440 432 470 Z"
        fill="#F0A018" opacity="0.8" filter="url(#flameGlow)"/>
  <!-- Core flame (bright yellow-white) -->
  <path d="M 378 470 Q 376 448 384 420 Q 390 398 400 372 Q 410 398 416 420 Q 424 448 416 470 Z"
        fill="#F8D040" opacity="0.85" filter="url(#flameGlow)"/>
  <!-- Tip flame (white hot) -->
  <ellipse cx="400" cy="375" rx="12" ry="20" fill="#FFFFFF" opacity="0.4" filter="url(#flameGlow)"/>

  <!-- Smoke wisps -->
  <path d="M 390 220 Q 380 200 390 180 Q 400 165 385 148" stroke="#5A5040" stroke-width="3" fill="none" opacity="0.2"/>
  <path d="M 410 235 Q 422 212 412 192 Q 400 174 415 156" stroke="#4A4030" stroke-width="2.5" fill="none" opacity="0.15"/>

  <!-- Label -->
  <rect x="240" y="543" width="320" height="44" rx="4" fill="#0D1F18" opacity="0.9"/>
  <rect x="240" y="543" width="320" height="44" rx="4" fill="none" stroke="#C9A86A" stroke-width="1.2" opacity="0.6"/>
  <text x="400" y="571" font-family="Georgia, 'Times New Roman', serif" font-size="20"
        fill="#C9A86A" text-anchor="middle" letter-spacing="5" font-weight="bold">THE FIREPLACE</text>
</svg>
