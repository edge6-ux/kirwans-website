<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="1200" height="800">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="30%" r="80%">
      <stop offset="0%" stop-color="#1A2A1A"/>
      <stop offset="100%" stop-color="#0D1F18"/>
    </radialGradient>
    <radialGradient id="lamp1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#E8A830" stop-opacity="0.7"/>
      <stop offset="40%" stop-color="#CC7820" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#CC8A2A" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="lamp2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#E8A830" stop-opacity="0.6"/>
      <stop offset="40%" stop-color="#CC7820" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#CC8A2A" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="lamp3" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#E8A830" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#CC8A2A" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="barGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3D2510"/>
      <stop offset="40%" stop-color="#2A1808"/>
      <stop offset="100%" stop-color="#1A1008"/>
    </linearGradient>
    <linearGradient id="barTopGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#6A4020"/>
      <stop offset="100%" stop-color="#3D2510"/>
    </linearGradient>
    <linearGradient id="shelfGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4A3018"/>
      <stop offset="100%" stop-color="#2A1A08"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softShadow">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Background wall -->
  <rect width="1200" height="800" fill="url(#bgGrad)"/>

  <!-- Wall panelling horizontal lines -->
  <g opacity="0.15">
    <rect x="0" y="100" width="1200" height="3" fill="#3D2B1A"/>
    <rect x="0" y="200" width="1200" height="2" fill="#3D2B1A"/>
    <rect x="0" y="300" width="1200" height="3" fill="#2C1F10"/>
    <rect x="0" y="400" width="1200" height="2" fill="#3D2B1A"/>
    <rect x="0" y="500" width="1200" height="3" fill="#3D2B1A"/>
  </g>

  <!-- Wall vertical panel dividers -->
  <g opacity="0.08" stroke="#5C3D1A" stroke-width="2">
    <line x1="200" y1="0" x2="200" y2="560"/>
    <line x1="400" y1="0" x2="400" y2="560"/>
    <line x1="600" y1="0" x2="600" y2="560"/>
    <line x1="800" y1="0" x2="800" y2="560"/>
    <line x1="1000" y1="0" x2="1000" y2="560"/>
  </g>

  <!-- Bottle shelf backboard (behind bar) -->
  <rect x="0" y="80" width="1200" height="380" fill="#0A1A10" opacity="0.7"/>

  <!-- Upper shelf -->
  <rect x="50" y="140" width="1100" height="16" rx="2" fill="url(#shelfGrad)" filter="url(#softShadow)"/>
  <!-- Lower shelf -->
  <rect x="50" y="270" width="1100" height="16" rx="2" fill="url(#shelfGrad)" filter="url(#softShadow)"/>
  <!-- Third shelf -->
  <rect x="100" y="400" width="1000" height="14" rx="2" fill="url(#shelfGrad)" filter="url(#softShadow)"/>

  <!-- Bottles on upper shelf (various heights and widths) -->
  <g filter="url(#softShadow)">
    <!-- Bottle group 1 (whiskeys - tall and narrow) -->
    <rect x="80" y="80" width="22" height="62" rx="4" fill="#5A3820"/>
    <rect x="90" y="78" width="6" height="10" rx="2" fill="#6A4828"/>
    <rect x="110" y="85" width="20" height="57" rx="4" fill="#8B5A30"/>
    <rect x="118" y="83" width="6" height="10" rx="2" fill="#9A6838"/>
    <rect x="138" y="82" width="22" height="60" rx="4" fill="#3A2410"/>
    <rect x="148" y="80" width="6" height="10" rx="2" fill="#4A3018"/>
    <rect x="168" y="88" width="18" height="54" rx="4" fill="#6A3818"/>
    <rect x="175" y="86" width="5" height="9" rx="2" fill="#7A4828"/>
    <!-- Bottle group 2 (gin/vodka - clear-ish) -->
    <rect x="240" y="84" width="20" height="58" rx="4" fill="#2A4A3A"/>
    <rect x="249" y="82" width="5" height="10" rx="2" fill="#3A5A4A"/>
    <rect x="268" y="80" width="24" height="62" rx="4" fill="#1E3828"/>
    <rect x="278" y="78" width="7" height="10" rx="2" fill="#2A4838"/>
    <rect x="300" y="86" width="18" height="56" rx="4" fill="#3A4830"/>
    <rect x="307" y="84" width="5" height="9" rx="2" fill="#4A5840"/>
    <!-- Group 3 -->
    <rect x="380" y="82" width="20" height="60" rx="4" fill="#5A2818"/>
    <rect x="410" y="79" width="22" height="63" rx="4" fill="#8B6030"/>
    <rect x="440" y="85" width="18" height="57" rx="4" fill="#6A4020"/>
    <rect x="466" y="81" width="20" height="61" rx="4" fill="#3A2A18"/>
    <rect x="494" y="84" width="22" height="58" rx="4" fill="#5C3820"/>
    <!-- Group 4 -->
    <rect x="560" y="80" width="20" height="62" rx="4" fill="#1E2A3A"/>
    <rect x="588" y="83" width="18" height="59" rx="4" fill="#2A3A4A"/>
    <rect x="614" y="81" width="22" height="61" rx="4" fill="#182A20"/>
    <rect x="644" y="84" width="20" height="58" rx="4" fill="#3A2010"/>
    <!-- Group 5 -->
    <rect x="720" y="81" width="22" height="61" rx="4" fill="#6A3A18"/>
    <rect x="750" y="83" width="20" height="59" rx="4" fill="#8A5028"/>
    <rect x="778" y="80" width="24" height="62" rx="4" fill="#4A2A10"/>
    <rect x="810" y="84" width="18" height="58" rx="4" fill="#5C3820"/>
    <!-- Group 6 -->
    <rect x="880" y="82" width="20" height="60" rx="4" fill="#2E4A2A"/>
    <rect x="908" y="79" width="22" height="63" rx="4" fill="#3A5A30"/>
    <rect x="938" y="83" width="18" height="59" rx="4" fill="#6A3018"/>
    <rect x="964" y="80" width="22" height="62" rx="4" fill="#5A2A10"/>
    <rect x="994" y="84" width="20" height="58" rx="4" fill="#4A3818"/>
    <!-- Group 7 far right -->
    <rect x="1060" y="82" width="22" height="60" rx="4" fill="#6A4A20"/>
    <rect x="1090" y="79" width="20" height="63" rx="4" fill="#3A2810"/>
    <rect x="1118" y="83" width="22" height="59" rx="4" fill="#5A3018"/>
  </g>

  <!-- Bottles on lower shelf -->
  <g filter="url(#softShadow)" opacity="0.85">
    <rect x="80" y="212" width="24" height="60" rx="4" fill="#5A3820"/>
    <rect x="112" y="215" width="20" height="57" rx="4" fill="#3A2010"/>
    <rect x="140" y="210" width="28" height="62" rx="3" fill="#2A4A3A"/>
    <rect x="176" y="214" width="22" height="58" rx="4" fill="#6A3818"/>
    <rect x="260" y="211" width="24" height="61" rx="4" fill="#8A5028"/>
    <rect x="292" y="214" width="20" height="58" rx="4" fill="#4A2A18"/>
    <rect x="320" y="210" width="26" height="62" rx="4" fill="#5C3820"/>
    <rect x="450" y="212" width="24" height="60" rx="4" fill="#3A5A30"/>
    <rect x="482" y="214" width="22" height="58" rx="4" fill="#1E2A3A"/>
    <rect x="512" y="211" width="24" height="61" rx="4" fill="#6A4020"/>
    <rect x="640" y="212" width="22" height="60" rx="4" fill="#5A2818"/>
    <rect x="670" y="214" width="20" height="58" rx="4" fill="#8B5A30"/>
    <rect x="698" y="210" width="24" height="62" rx="4" fill="#3A2410"/>
    <rect x="830" y="212" width="22" height="60" rx="4" fill="#2A3A4A"/>
    <rect x="860" y="214" width="20" height="57" rx="4" fill="#4A3018"/>
    <rect x="886" y="211" width="24" height="61" rx="4" fill="#6A3818"/>
    <rect x="1020" y="212" width="22" height="60" rx="4" fill="#5A3820"/>
    <rect x="1050" y="214" width="26" height="58" rx="4" fill="#3A2A18"/>
    <rect x="1084" y="210" width="20" height="62" rx="4" fill="#6A4020"/>
  </g>

  <!-- Hanging lamps -->
  <!-- Lamp 1 (left) -->
  <line x1="250" y1="0" x2="250" y2="66" stroke="#8A7D6E" stroke-width="2.5" opacity="0.6"/>
  <path d="M 228 66 Q 228 48 250 44 Q 272 48 272 66 L 268 88 Q 260 96 250 96 Q 240 96 232 88 Z"
        fill="#2A1A08" stroke="#C9A86A" stroke-width="1.5"/>
  <ellipse cx="250" cy="96" rx="18" ry="6" fill="#3A2A10"/>
  <!-- Lamp glow 1 -->
  <ellipse cx="250" cy="200" rx="220" ry="180" fill="url(#lamp1)"/>

  <!-- Lamp 2 (center) -->
  <line x1="600" y1="0" x2="600" y2="58" stroke="#8A7D6E" stroke-width="2.5" opacity="0.6"/>
  <path d="M 576 58 Q 576 40 600 36 Q 624 40 624 58 L 620 82 Q 612 90 600 90 Q 588 90 580 82 Z"
        fill="#2A1A08" stroke="#C9A86A" stroke-width="1.5"/>
  <ellipse cx="600" cy="90" rx="20" ry="7" fill="#3A2A10"/>
  <!-- Lamp glow 2 -->
  <ellipse cx="600" cy="220" rx="250" ry="200" fill="url(#lamp2)"/>

  <!-- Lamp 3 (right) -->
  <line x1="950" y1="0" x2="950" y2="62" stroke="#8A7D6E" stroke-width="2.5" opacity="0.6"/>
  <path d="M 928 62 Q 928 44 950 40 Q 972 44 972 62 L 968 84 Q 960 94 950 94 Q 940 94 932 84 Z"
        fill="#2A1A08" stroke="#C9A86A" stroke-width="1.5"/>
  <ellipse cx="950" cy="94" rx="18" ry="6" fill="#3A2A10"/>
  <!-- Lamp glow 3 -->
  <ellipse cx="950" cy="200" rx="220" ry="180" fill="url(#lamp3)"/>

  <!-- Bar counter (main horizontal structure) -->
  <!-- Bar face -->
  <rect x="0" y="560" width="1200" height="240" fill="url(#barGrad)"/>
  <!-- Bar top surface -->
  <rect x="0" y="555" width="1200" height="30" fill="url(#barTopGrad)"/>
  <!-- Bar top highlight edge -->
  <rect x="0" y="555" width="1200" height="3" fill="#C9A86A" opacity="0.35"/>
  <!-- Bar top reflection strip -->
  <rect x="0" y="558" width="1200" height="8" fill="#8B6030" opacity="0.25"/>

  <!-- Bar panel details (raised panels on front) -->
  <g opacity="0.35" stroke="#5C3D1A" stroke-width="1.5" fill="#1A1008">
    <rect x="30" y="600" width="160" height="120" rx="3"/>
    <rect x="220" y="600" width="160" height="120" rx="3"/>
    <rect x="410" y="600" width="160" height="120" rx="3"/>
    <rect x="600" y="600" width="160" height="120" rx="3"/>
    <rect x="790" y="600" width="160" height="120" rx="3"/>
    <rect x="980" y="600" width="160" height="120" rx="3"/>
  </g>

  <!-- Bar rail (brass foot rail) -->
  <rect x="0" y="755" width="1200" height="10" rx="5" fill="#C9A86A" opacity="0.4"/>

  <!-- Beer taps on bar top -->
  <g fill="#C9A86A" opacity="0.7">
    <!-- Tap 1 -->
    <rect x="480" y="500" width="12" height="58" rx="4"/>
    <ellipse cx="486" cy="498" rx="14" ry="8" fill="#AA8848"/>
    <rect x="478" y="550" width="16" height="10" rx="2" fill="#AA8848"/>
    <!-- Tap 2 -->
    <rect x="520" y="504" width="12" height="54" rx="4"/>
    <ellipse cx="526" cy="502" rx="14" ry="8" fill="#AA8848"/>
    <rect x="518" y="550" width="16" height="10" rx="2" fill="#AA8848"/>
    <!-- Tap 3 -->
    <rect x="560" y="498" width="12" height="60" rx="4"/>
    <ellipse cx="566" cy="496" rx="14" ry="8" fill="#AA8848"/>
    <rect x="558" y="550" width="16" height="10" rx="2" fill="#AA8848"/>
    <!-- Tap 4 -->
    <rect x="600" y="502" width="12" height="56" rx="4"/>
    <ellipse cx="606" cy="500" rx="14" ry="8" fill="#AA8848"/>
    <rect x="598" y="550" width="16" height="10" rx="2" fill="#AA8848"/>
  </g>

  <!-- Bar stools silhouettes (3 stools) -->
  <!-- Stool 1 -->
  <g fill="#1A1008" stroke="#2A1A10" stroke-width="1.5">
    <ellipse cx="200" cy="558" rx="42" ry="10"/>
    <rect x="196" y="558" width="8" height="60" rx="3"/>
    <path d="M 180 618 L 196 600 M 220 618 L 204 600" stroke="#2A1A10" stroke-width="5" fill="none"/>
    <rect x="170" y="616" width="60" height="6" rx="3"/>
  </g>
  <!-- Stool 2 -->
  <g fill="#1A1008" stroke="#2A1A10" stroke-width="1.5">
    <ellipse cx="400" cy="556" rx="42" ry="10"/>
    <rect x="396" y="556" width="8" height="62" rx="3"/>
    <path d="M 380 618 L 396 600 M 420 618 L 404 600" stroke="#2A1A10" stroke-width="5" fill="none"/>
    <rect x="370" y="616" width="60" height="6" rx="3"/>
  </g>
  <!-- Stool 3 (partially off right) -->
  <g fill="#1A1008" stroke="#2A1A10" stroke-width="1.5">
    <ellipse cx="850" cy="557" rx="42" ry="10"/>
    <rect x="846" y="557" width="8" height="61" rx="3"/>
    <path d="M 830 618 L 846 600 M 870 618 L 854 600" stroke="#2A1A10" stroke-width="5" fill="none"/>
    <rect x="820" y="616" width="60" height="6" rx="3"/>
  </g>

  <!-- Floor -->
  <rect x="0" y="780" width="1200" height="20" fill="#0A1408"/>

  <!-- Decorative top border -->
  <rect x="0" y="0" width="1200" height="4" fill="#C9A86A" opacity="0.4"/>

  <!-- Label -->
  <rect x="480" y="738" width="240" height="44" rx="4" fill="#0D1F18" opacity="0.88"/>
  <rect x="480" y="738" width="240" height="44" rx="4" fill="none" stroke="#C9A86A" stroke-width="1.2" opacity="0.6"/>
  <text x="600" y="766" font-family="Georgia, 'Times New Roman', serif" font-size="20"
        fill="#C9A86A" text-anchor="middle" letter-spacing="6" font-weight="bold">EST. 2018</text>
</svg>
