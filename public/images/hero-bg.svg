<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <radialGradient id="ambientGlow" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#CC8A2A" stop-opacity="0.35"/>
      <stop offset="40%" stop-color="#8B5E1A" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#0D1F18" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="vignette" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="transparent"/>
      <stop offset="70%" stop-color="#0D1F18" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#0D1F18" stop-opacity="0.9"/>
    </radialGradient>
    <radialGradient id="lampGlow" cx="50%" cy="45%" r="30%">
      <stop offset="0%" stop-color="#E8A830" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="#CC8A2A" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#0D1F18" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
    <filter id="textGlow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Base dark background -->
  <rect width="1920" height="1080" fill="#0D1F18"/>

  <!-- Timber panel horizontal lines -->
  <g opacity="0.18">
    <rect x="0" y="80" width="1920" height="3" fill="#3D2B1A"/>
    <rect x="0" y="160" width="1920" height="2" fill="#3D2B1A"/>
    <rect x="0" y="240" width="1920" height="3" fill="#2C1F10"/>
    <rect x="0" y="320" width="1920" height="2" fill="#3D2B1A"/>
    <rect x="0" y="400" width="1920" height="3" fill="#3D2B1A"/>
    <rect x="0" y="480" width="1920" height="2" fill="#2C1F10"/>
    <rect x="0" y="560" width="1920" height="3" fill="#3D2B1A"/>
    <rect x="0" y="640" width="1920" height="2" fill="#3D2B1A"/>
    <rect x="0" y="720" width="1920" height="3" fill="#2C1F10"/>
    <rect x="0" y="800" width="1920" height="2" fill="#3D2B1A"/>
    <rect x="0" y="880" width="1920" height="3" fill="#3D2B1A"/>
    <rect x="0" y="960" width="1920" height="2" fill="#2C1F10"/>
    <rect x="0" y="1040" width="1920" height="3" fill="#3D2B1A"/>
  </g>

  <!-- Subtle wood grain vertical texture lines -->
  <g opacity="0.06">
    <rect x="200" y="0" width="1" height="1080" fill="#8B6030"/>
    <rect x="450" y="0" width="1" height="1080" fill="#8B6030"/>
    <rect x="700" y="0" width="2" height="1080" fill="#8B6030"/>
    <rect x="950" y="0" width="1" height="1080" fill="#8B6030"/>
    <rect x="1200" y="0" width="1" height="1080" fill="#8B6030"/>
    <rect x="1450" y="0" width="2" height="1080" fill="#8B6030"/>
    <rect x="1700" y="0" width="1" height="1080" fill="#8B6030"/>
  </g>

  <!-- Ambient warm glow overlay -->
  <rect width="1920" height="1080" fill="url(#ambientGlow)"/>

  <!-- Central lamp glow -->
  <ellipse cx="960" cy="480" rx="560" ry="420" fill="url(#lampGlow)"/>

  <!-- Decorative top border bar -->
  <rect x="0" y="0" width="1920" height="6" fill="#C9A86A" opacity="0.5"/>
  <!-- Decorative bottom border bar -->
  <rect x="0" y="1074" width="1920" height="6" fill="#C9A86A" opacity="0.5"/>

  <!-- Decorative side ornament lines left -->
  <line x1="80" y1="100" x2="80" y2="980" stroke="#C9A86A" stroke-width="1" opacity="0.25"/>
  <line x1="90" y1="120" x2="90" y2="960" stroke="#C9A86A" stroke-width="0.5" opacity="0.15"/>
  <!-- Decorative side ornament lines right -->
  <line x1="1840" y1="100" x2="1840" y2="980" stroke="#C9A86A" stroke-width="1" opacity="0.25"/>
  <line x1="1830" y1="120" x2="1830" y2="960" stroke="#C9A86A" stroke-width="0.5" opacity="0.15"/>

  <!-- Corner ornaments -->
  <g opacity="0.4" stroke="#C9A86A" stroke-width="2" fill="none">
    <!-- Top-left -->
    <polyline points="60,60 60,140 100,140"/>
    <polyline points="60,60 140,60 140,100"/>
    <!-- Top-right -->
    <polyline points="1860,60 1860,140 1820,140"/>
    <polyline points="1860,60 1780,60 1780,100"/>
    <!-- Bottom-left -->
    <polyline points="60,1020 60,940 100,940"/>
    <polyline points="60,1020 140,1020 140,980"/>
    <!-- Bottom-right -->
    <polyline points="1860,1020 1860,940 1820,940"/>
    <polyline points="1860,1020 1780,1020 1780,980"/>
  </g>

  <!-- Glow behind text -->
  <ellipse cx="960" cy="540" rx="480" ry="120" fill="#C9A86A" opacity="0.07" filter="url(#blur)"/>

  <!-- Main KIRWAN'S text -->
  <text x="960" y="510" font-family="Georgia, 'Times New Roman', serif" font-size="160" font-weight="bold"
        fill="#C9A86A" text-anchor="middle" letter-spacing="28" filter="url(#textGlow)" opacity="0.95">KIRWAN'S</text>

  <!-- Decorative rule above tagline -->
  <line x1="560" y1="550" x2="820" y2="550" stroke="#C9A86A" stroke-width="1.5" opacity="0.6"/>
  <circle cx="960" cy="550" r="4" fill="#C9A86A" opacity="0.6"/>
  <line x1="1100" y1="550" x2="1360" y2="550" stroke="#C9A86A" stroke-width="1.5" opacity="0.6"/>

  <!-- Tagline -->
  <text x="960" y="610" font-family="Georgia, serif" font-size="32" fill="#F5F0E8"
        text-anchor="middle" letter-spacing="12" opacity="0.7">PREMIUM IRISH PUB</text>

  <!-- Est line -->
  <text x="960" y="660" font-family="Georgia, serif" font-size="22" fill="#C9A86A"
        text-anchor="middle" letter-spacing="8" opacity="0.55">EST. 2018</text>

  <!-- Vignette overlay -->
  <rect width="1920" height="1080" fill="url(#vignette)"/>
</svg>
