<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" width="1200" height="600">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#1A2A1A"/>
      <stop offset="100%" stop-color="#0D1F18"/>
    </radialGradient>
    <radialGradient id="stageLight1" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#E8A830" stop-opacity="0.7"/>
      <stop offset="40%" stop-color="#CC7818" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#CC8A2A" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="stageLight2" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#E8A830" stop-opacity="0.55"/>
      <stop offset="40%" stop-color="#CC7818" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#CC8A2A" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="stageLight3" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#E8C050" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#CC8A2A" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="stageGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2A1A08"/>
      <stop offset="100%" stop-color="#140C04"/>
    </linearGradient>
    <linearGradient id="fidbleBodyGrad" x1="20%" y1="20%" x2="80%" y2="80%">
      <stop offset="0%" stop-color="#8B4A18"/>
      <stop offset="50%" stop-color="#6A3410"/>
      <stop offset="100%" stop-color="#4A2008"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="2" dy="6" stdDeviation="8" flood-color="#000000" flood-opacity="0.6"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="600" fill="url(#bgGrad)"/>

  <!-- Wall panelling -->
  <g opacity="0.08">
    <rect x="0" y="60" width="1200" height="2" fill="#3D2B1A"/>
    <rect x="0" y="120" width="1200" height="2" fill="#3D2B1A"/>
    <rect x="0" y="180" width="1200" height="2" fill="#2C1F10"/>
    <rect x="0" y="240" width="1200" height="2" fill="#3D2B1A"/>
    <rect x="0" y="300" width="1200" height="2" fill="#3D2B1A"/>
  </g>

  <!-- Stage area -->
  <!-- Stage platform -->
  <rect x="80" y="380" width="1040" height="120" rx="4" fill="url(#stageGrad)"/>
  <rect x="80" y="380" width="1040" height="8" rx="4" fill="#3A2208" opacity="0.7"/>
  <!-- Stage front edge / lip -->
  <rect x="75" y="492" width="1050" height="16" rx="3" fill="#2A1808"/>
  <rect x="75" y="492" width="1050" height="4" rx="2" fill="#C9A86A" opacity="0.25"/>

  <!-- Stage floor planks -->
  <g opacity="0.18" stroke="#1A0E04" stroke-width="1.5">
    <line x1="80" y1="420" x2="1120" y2="420"/>
    <line x1="80" y1="455" x2="1120" y2="455"/>
    <line x1="200" y1="380" x2="200" y2="492"/>
    <line x1="350" y1="380" x2="350" y2="492"/>
    <line x1="500" y1="380" x2="500" y2="492"/>
    <line x1="650" y1="380" x2="650" y2="492"/>
    <line x1="800" y1="380" x2="800" y2="492"/>
    <line x1="950" y1="380" x2="950" y2="492"/>
    <line x1="1070" y1="380" x2="1070" y2="492"/>
  </g>

  <!-- Stage lights from above -->
  <!-- Light cone 1 (left) -->
  <path d="M 240 0 L 160 380 L 320 380 Z" fill="#E8A830" opacity="0.06"/>
  <ellipse cx="240" cy="375" rx="80" ry="15" fill="#E8A830" opacity="0.1"/>
  <!-- Light cone 2 (center-left) -->
  <path d="M 500 0 L 400 380 L 600 380 Z" fill="#E8C040" opacity="0.07"/>
  <ellipse cx="500" cy="375" rx="95" ry="15" fill="#E8C040" opacity="0.12"/>
  <!-- Light cone 3 (center-right) -->
  <path d="M 700 0 L 600 380 L 800 380 Z" fill="#E8A830" opacity="0.06"/>
  <ellipse cx="700" cy="375" rx="90" ry="15" fill="#E8A830" opacity="0.1"/>
  <!-- Light cone 4 (right) -->
  <path d="M 960 0 L 880 380 L 1040 380 Z" fill="#E8A830" opacity="0.06"/>
  <ellipse cx="960" cy="375" rx="80" ry="15" fill="#E8A830" opacity="0.1"/>

  <!-- Spot lights (hanging fixtures) -->
  <g fill="#1A1010" stroke="#C9A86A" stroke-width="1.2" opacity="0.7">
    <!-- Light 1 -->
    <line x1="240" y1="0" x2="240" y2="32" stroke="#8A7D6E" stroke-width="2"/>
    <rect x="222" y="32" width="36" height="22" rx="4"/>
    <ellipse cx="240" cy="54" rx="18" ry="8"/>
    <!-- Light 2 -->
    <line x1="500" y1="0" x2="500" y2="28" stroke="#8A7D6E" stroke-width="2"/>
    <rect x="482" y="28" width="36" height="22" rx="4"/>
    <ellipse cx="500" cy="50" rx="18" ry="8"/>
    <!-- Light 3 -->
    <line x1="700" y1="0" x2="700" y2="30" stroke="#8A7D6E" stroke-width="2"/>
    <rect x="682" y="30" width="36" height="22" rx="4"/>
    <ellipse cx="700" cy="52" rx="18" ry="8"/>
    <!-- Light 4 -->
    <line x1="960" y1="0" x2="960" y2="32" stroke="#8A7D6E" stroke-width="2"/>
    <rect x="942" y="32" width="36" height="22" rx="4"/>
    <ellipse cx="960" cy="54" rx="18" ry="8"/>
  </g>

  <!-- Stage ambient glow pools -->
  <ellipse cx="300" cy="390" rx="200" ry="80" fill="url(#stageLight1)"/>
  <ellipse cx="600" cy="390" rx="220" ry="90" fill="url(#stageLight2)"/>
  <ellipse cx="900" cy="390" rx="200" ry="80" fill="url(#stageLight3)"/>

  <!-- === FIDDLE === (center-left of stage) -->
  <g transform="translate(300, 120) rotate(-5)">
    <!-- Fiddle body (figure-eight shape) -->
    <!-- Lower bout -->
    <ellipse cx="0" cy="140" rx="72" ry="88" fill="url(#fidbleBodyGrad)" filter="url(#shadow)"/>
    <!-- Upper bout -->
    <ellipse cx="0" cy="20" rx="58" ry="72" fill="url(#fidbleBodyGrad)"/>
    <!-- Waist (C-bouts) - overlay to create the waist shape -->
    <rect x="-34" y="70" width="68" height="60" fill="#0D1F18" opacity="0.85"/>
    <!-- Waist cutouts (f-holes area shaping) -->
    <ellipse cx="0" cy="100" rx="20" ry="35" fill="url(#fidbleBodyGrad)"/>
    <!-- Top plate highlight -->
    <ellipse cx="-15" cy="30" rx="28" ry="35" fill="#A05A20" opacity="0.3"/>
    <ellipse cx="-15" cy="150" rx="35" ry="45" fill="#A05A20" opacity="0.25"/>
    <!-- F-holes -->
    <path d="M -18 80 Q -22 95 -18 110 M -22 88 L -14 88 M -22 102 L -14 102" stroke="#1A0A04" stroke-width="2.5" fill="none" opacity="0.7"/>
    <path d="M 18 80 Q 22 95 18 110 M 22 88 L 14 88 M 22 102 L 14 102" stroke="#1A0A04" stroke-width="2.5" fill="none" opacity="0.7"/>
    <!-- Neck -->
    <rect x="-10" y="-72" width="20" height="96" rx="6" fill="#5A3010"/>
    <!-- Scroll head -->
    <ellipse cx="0" cy="-78" rx="16" ry="12" fill="#5A3010"/>
    <path d="M -10 -78 Q -18 -92 -12 -102 Q -4 -110 4 -100 Q 12 -90 8 -78" stroke="#3A2008" stroke-width="2" fill="none"/>
    <!-- Tuning pegs -->
    <rect x="-22" y="-86" width="10" height="6" rx="2" fill="#6A4010" transform="rotate(-15, -17, -83)"/>
    <rect x="-22" y="-76" width="10" height="6" rx="2" fill="#6A4010" transform="rotate(-15, -17, -73)"/>
    <rect x="12" y="-86" width="10" height="6" rx="2" fill="#6A4010" transform="rotate(15, 17, -83)"/>
    <rect x="12" y="-76" width="10" height="6" rx="2" fill="#6A4010" transform="rotate(15, 17, -73)"/>
    <!-- Strings (4 strings) -->
    <line x1="-6" y1="-68" x2="-10" y2="230" stroke="#D8C8A8" stroke-width="0.8" opacity="0.6"/>
    <line x1="-2" y1="-68" x2="-4" y2="230" stroke="#D8C8A8" stroke-width="0.8" opacity="0.6"/>
    <line x1="2" y1="-68" x2="4" y2="230" stroke="#D8C8A8" stroke-width="0.8" opacity="0.6"/>
    <line x1="6" y1="-68" x2="10" y2="230" stroke="#D8C8A8" stroke-width="0.8" opacity="0.6"/>
    <!-- Bridge -->
    <rect x="-12" y="115" width="24" height="8" rx="1" fill="#C8A868" opacity="0.7"/>
    <!-- Tailpiece -->
    <path d="M -14 200 L -10 225 L 10 225 L 14 200 Z" fill="#3A2008" opacity="0.7"/>
    <!-- Chin rest -->
    <ellipse cx="20" cy="195" rx="18" ry="10" fill="#4A2810" opacity="0.6"/>
  </g>

  <!-- BOW for fiddle -->
  <g transform="translate(220, 50) rotate(35)">
    <line x1="0" y1="0" x2="0" y2="320" stroke="#7A5028" stroke-width="6" stroke-linecap="round"/>
    <!-- Bow hair (lighter line) -->
    <line x1="2" y1="5" x2="2" y2="315" stroke="#E8E0D0" stroke-width="2" opacity="0.5"/>
    <!-- Frog (bow end piece) -->
    <rect x="-5" y="305" width="14" height="24" rx="3" fill="#2A1A08"/>
  </g>

  <!-- === BODHRAN DRUM === (right side of stage) -->
  <g transform="translate(820, 220)">
    <!-- Drum frame (circular) -->
    <circle cx="0" cy="0" r="120" fill="#C8A040" opacity="0.75" filter="url(#shadow)"/>
    <!-- Drum head (skin) -->
    <circle cx="0" cy="0" r="110" fill="#D4B860" opacity="0.65"/>
    <!-- Drum frame outer ring -->
    <circle cx="0" cy="0" r="120" fill="none" stroke="#6A4010" stroke-width="14"/>
    <!-- Frame wood grain / detail -->
    <circle cx="0" cy="0" r="113" fill="none" stroke="#8A5820" stroke-width="3" opacity="0.4"/>
    <circle cx="0" cy="0" r="107" fill="none" stroke="#5A3A10" stroke-width="2" opacity="0.3"/>
    <!-- Skin texture lines (drum head) -->
    <ellipse cx="0" cy="0" rx="80" ry="75" fill="none" stroke="#C0A040" stroke-width="1" opacity="0.3"/>
    <ellipse cx="-10" cy="-10" rx="45" ry="42" fill="none" stroke="#C0A040" stroke-width="0.8" opacity="0.2"/>
    <!-- Drum cross-braces (interior) -->
    <line x1="-108" y1="0" x2="108" y2="0" stroke="#6A4010" stroke-width="5" opacity="0.5"/>
    <line x1="0" y1="-108" x2="0" y2="108" stroke="#6A4010" stroke-width="5" opacity="0.5"/>
    <!-- Cross intersection -->
    <circle cx="0" cy="0" r="10" fill="#6A4010" opacity="0.6"/>
    <!-- Drum highlight -->
    <ellipse cx="-25" cy="-30" rx="45" ry="35" fill="#E8D080" opacity="0.15" transform="rotate(-15, -25, -30)"/>
  </g>

  <!-- Tipper / bodhran beater -->
  <g transform="translate(970, 160) rotate(40)">
    <rect x="-4" y="-10" width="8" height="120" rx="4" fill="#8A5A28" filter="url(#shadow)"/>
    <!-- Tipper knob -->
    <ellipse cx="0" cy="-14" rx="10" ry="8" fill="#6A3A18"/>
    <ellipse cx="0" cy="112" rx="10" ry="8" fill="#6A3A18"/>
  </g>

  <!-- Microphone stand (center stage) -->
  <g transform="translate(600, 140)">
    <!-- Stand pole -->
    <rect x="-4" y="0" width="8" height="240" rx="3" fill="#3A3A38"/>
    <!-- Boom arm -->
    <line x1="0" y1="60" x2="-120" y2="30" stroke="#3A3A38" stroke-width="6" stroke-linecap="round"/>
    <!-- Mic capsule -->
    <rect x="-150" y="10" width="28" height="48" rx="14" fill="#2A2A28"/>
    <rect x="-148" y="12" width="24" height="44" rx="12" fill="#222220" stroke="#444440" stroke-width="1"/>
    <!-- Mic grille dots -->
    <circle cx="-136" cy="28" r="2" fill="#3A3A38" opacity="0.5"/>
    <circle cx="-142" cy="34" r="2" fill="#3A3A38" opacity="0.5"/>
    <circle cx="-130" cy="34" r="2" fill="#3A3A38" opacity="0.5"/>
    <circle cx="-136" cy="40" r="2" fill="#3A3A38" opacity="0.5"/>
    <!-- Stand base (tripod) -->
    <line x1="0" y1="240" x2="-60" y2="260" stroke="#3A3A38" stroke-width="5" stroke-linecap="round"/>
    <line x1="0" y1="240" x2="60" y2="260" stroke="#3A3A38" stroke-width="5" stroke-linecap="round"/>
    <line x1="0" y1="240" x2="0" y2="262" stroke="#3A3A38" stroke-width="5" stroke-linecap="round"/>
  </g>

  <!-- Music notes floating in the air -->
  <g fill="#C9A86A" opacity="0.4" font-family="serif" font-size="36">
    <text x="130" y="80" transform="rotate(-15, 130, 80)">&#9834;</text>
    <text x="420" y="65" transform="rotate(10, 420, 65)" font-size="28">&#9835;</text>
    <text x="1000" y="75" transform="rotate(-8, 1000, 75)">&#9834;</text>
    <text x="730" y="58" transform="rotate(12, 730, 58)" font-size="28">&#9835;</text>
    <text x="1060" y="120" transform="rotate(-20, 1060, 120)" font-size="22">&#9834;</text>
    <text x="170" y="55" transform="rotate(8, 170, 55)" font-size="22">&#9835;</text>
  </g>

  <!-- Decorative stage backdrop (subtle banners suggestion) -->
  <g opacity="0.12">
    <rect x="80" y="100" width="8" height="280" fill="#C9A86A"/>
    <rect x="1112" y="100" width="8" height="280" fill="#C9A86A"/>
  </g>

  <!-- Floor area in front of stage -->
  <rect x="0" y="508" width="1200" height="92" fill="#0A1408"/>
  <rect x="0" y="508" width="1200" height="2" fill="#1A2010" opacity="0.5"/>

  <!-- Decorative top border -->
  <rect x="0" y="0" width="1200" height="4" fill="#C9A86A" opacity="0.4"/>

  <!-- Label -->
  <rect x="430" y="540" width="340" height="44" rx="4" fill="#0D1F18" opacity="0.92"/>
  <rect x="430" y="540" width="340" height="44" rx="4" fill="none" stroke="#C9A86A" stroke-width="1.2" opacity="0.6"/>
  <text x="600" y="568" font-family="Georgia, 'Times New Roman', serif" font-size="19"
        fill="#C9A86A" text-anchor="middle" letter-spacing="4" font-weight="bold">LIVE MUSIC NIGHT</text>
</svg>
