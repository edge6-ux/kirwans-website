<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#1A3028"/>
      <stop offset="100%" stop-color="#0D1F18"/>
    </radialGradient>
    <radialGradient id="silhouetteGrad" cx="45%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#1E3A2A"/>
      <stop offset="100%" stop-color="#0D2018"/>
    </radialGradient>
    <radialGradient id="glowRad" cx="50%" cy="35%" r="55%">
      <stop offset="0%" stop-color="#C9A86A" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#C9A86A" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="circleClipB">
      <circle cx="200" cy="200" r="190"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="400" height="400" fill="url(#bgGrad)"/>

  <!-- Circle portrait -->
  <circle cx="200" cy="200" r="185" fill="#122A1E"/>
  <circle cx="200" cy="200" r="185" fill="none" stroke="#C9A86A" stroke-width="3" opacity="0.7"/>
  <circle cx="200" cy="200" r="178" fill="none" stroke="#C9A86A" stroke-width="0.8" opacity="0.3"/>
  <circle cx="200" cy="200" r="185" fill="url(#glowRad)"/>

  <!-- Silhouette clipped -->
  <g clip-path="url(#circleClipB)">
    <!-- Shirt / waistcoat (bartender vest) - slightly broader shoulders -->
    <path d="M 38 400 Q 62 330 108 305 Q 143 287 168 278 Q 184 272 200 272 Q 216 272 232 278 Q 257 287 292 305 Q 338 330 362 400 Z"
          fill="url(#silhouetteGrad)"/>
    <!-- Waistcoat V-shape -->
    <path d="M 175 278 Q 188 295 200 300 Q 212 295 225 278 L 225 310 Q 212 325 200 328 Q 188 325 175 310 Z"
          fill="#0D1A14" opacity="0.7"/>
    <!-- Bow tie -->
    <path d="M 188 268 L 196 274 L 188 280 Z" fill="#C9A86A" opacity="0.7"/>
    <path d="M 212 268 L 204 274 L 212 280 Z" fill="#C9A86A" opacity="0.7"/>
    <circle cx="200" cy="274" r="4" fill="#C9A86A" opacity="0.7"/>
    <!-- Collar -->
    <path d="M 176 278 L 186 268 L 200 274 L 214 268 L 224 278" stroke="#2A4A3A" stroke-width="2" fill="none" opacity="0.5"/>
    <!-- Neck -->
    <rect x="188" y="248" width="24" height="36" rx="8" fill="url(#silhouetteGrad)"/>
    <!-- Head -->
    <ellipse cx="200" cy="212" rx="63" ry="72" fill="url(#silhouetteGrad)"/>
    <!-- Hair (medium length, slightly styled) -->
    <path d="M 137 198 Q 136 158 149 136 Q 163 112 182 104 Q 192 99 200 98 Q 208 99 218 104 Q 237 112 251 136 Q 264 158 263 198"
          fill="#0A1A10" stroke="none"/>
    <!-- Side hair taper -->
    <path d="M 137 198 Q 134 220 138 240" fill="#0A1A10" stroke="none"/>
    <path d="M 263 198 Q 266 220 262 240" fill="#0A1A10" stroke="none"/>
  </g>

  <!-- Inner shadow bottom -->
  <path d="M 15 260 Q 15 385 200 385 Q 385 385 385 260" fill="#0D1F18" opacity="0.2"/>

  <!-- Label -->
  <rect x="55" y="330" width="290" height="44" rx="4" fill="#0D1F18" opacity="0.88"/>
  <rect x="55" y="330" width="290" height="44" rx="4" fill="none" stroke="#C9A86A" stroke-width="1.5" opacity="0.65"/>
  <text x="200" y="358" font-family="Georgia, 'Times New Roman', serif" font-size="18"
        fill="#C9A86A" text-anchor="middle" letter-spacing="5" font-weight="bold">BARTENDER</text>
</svg>
